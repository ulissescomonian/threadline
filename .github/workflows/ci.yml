name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test and Release Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Swift toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build Release configuration
        run: swift build -c release

      - name: Package and verify ad-hoc app bundle
        run: make app
